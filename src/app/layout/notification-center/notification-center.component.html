<button mat-icon-button [matMenuTriggerFor]="menu" (click)="unreadCount.set(0)">
  <mat-icon
    [matBadge]="unreadCount()"
    [matBadgeHidden]="unreadCount() === 0"
    matBadgeColor="warn"
  >
    notifications
  </mat-icon>
</button>

<mat-menu #menu="matMenu" class="notification-dropdown">
  <div class="notif-header" (click)="$event.stopPropagation()">
    <h3>Notifications</h3>
    <button
      mat-button
      color="warn"
      (click)="markAsRead()"
      [disabled]="notifications().length === 0"
    >
      Clear All
    </button>
  </div>

  <mat-divider></mat-divider>

  @if (notifications().length === 0) {
    <div class="empty-state">No notifications yet.</div>
  }

  <div class="scroll-container">
    @for (n of notifications(); track n.id) {
      <button mat-menu-item class="notif-item" [class.unread]="!n.is_read">
        <mat-icon [style.color]="n.type === 'login' ? '#0d47a1' : '#e91e63'">
          {{ n.type === "login" ? "security" : "logout" }}
        </mat-icon>
        <div class="notif-content">
          <p class="notif-title">{{ n.title }}</p>
          <p class="notif-message">{{ n.message }}</p>
          <span class="notif-time">{{ n.created_at | date: "shortTime" }}</span>
        </div>
      </button>
    }
  </div>
</mat-menu>
