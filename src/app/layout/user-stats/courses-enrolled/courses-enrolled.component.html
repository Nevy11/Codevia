<div class="p-4">
  <div class="video-grid">
    @for (course of courses; track $index) {
    <mat-card class="video-card">
      <img
        mat-card-image
        [src]="course.thumbnail_url"
        alt="{{ course.video_id }}"
      />
      <mat-card-content>
        <h3>{{ course.title }}</h3>
      </mat-card-content>
      
      <p mat-line class="created-date">
        {{ course.created_at | date : "medium" }}
      </p>
    </mat-card>
    }
  </div>
</div>
